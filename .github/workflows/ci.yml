name: CI

# Fast checks on every push/PR to main. Releases (build.yml) only run on
# tags, so without this nothing gated typecheck/tests/audit on main.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check out Git repository
        uses: actions/checkout@v7

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Run tests
        run: npm test

      - name: Audit dependencies (fail on high/critical)
        run: npm audit --audit-level=high

  # End-to-end tests: build the app, then drive the real Electron binary
  # with Playwright (tests/e2e). Runs headless under xvfb on Linux.
  e2e:
    needs: check
    runs-on: ubuntu-latest
    steps:
      - name: Check out Git repository
        uses: actions/checkout@v7

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

      - name: Run E2E tests
        run: xvfb-run -a npm run test:e2e

      - name: Upload Playwright traces
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-traces
          path: test-results/
          if-no-files-found: ignore
