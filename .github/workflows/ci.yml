name: CI

# Fast checks on every push/PR to main. Releases (build.yml) only run on
# tags, so without this nothing gated typecheck/tests/audit on main.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check out Git repository
        uses: actions/checkout@v6

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Run tests
        run: npm test

      - name: Audit dependencies (fail on high/critical)
        run: npm audit --audit-level=high
