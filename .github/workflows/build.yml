name: Build and Release

on:
  push:
    tags:
      - 'v*'
  # Manual run = credential check only (see notarize-check job): signs and
  # notarizes the macOS app without creating a release or uploading assets.
  # Use after rotating Apple credentials or renewing the developer membership.
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # Pre-create the GitHub Release as a draft so the per-platform build jobs
  # have an upload target. electron-builder uploads binaries + latest*.yml
  # update-metadata directly to this draft via --publish always; the
  # finalize-release job at the end flips draft → live.
  #
  # Idempotent: if a prior failed run left a draft for this tag, we leave
  # it alone and let the build jobs add/overwrite assets onto it.
  prepare-release:
    # Tag pushes only. On workflow_dispatch this job is skipped, which
    # cascades through `needs` to skip build and finalize-release too —
    # manual runs execute only the notarize-check job below.
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Check out Git repository
        uses: actions/checkout@v7

      - name: Create or reuse draft release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "${{ github.ref_name }}" >/dev/null 2>&1; then
            echo "Release ${{ github.ref_name }} already exists; using it."
          else
            gh release create "${{ github.ref_name }}" --draft \
              --title "InsightLens ${{ github.ref_name }}" \
              --notes "## InsightLens Release ${{ github.ref_name }}

              ### Downloads

              #### Windows
              - \`InsightLens-Setup-*.exe\` - Windows installer

              #### macOS
              - \`InsightLens-*.dmg\` - macOS installer (separate x64 / arm64 builds)

              #### Linux
              - \`InsightLens-*.AppImage\` - Universal Linux app

              ### Installation Instructions

              **Windows:** Download and run the .exe installer

              **macOS:** Download the .dmg matching your Mac (arm64 for Apple Silicon, plain for Intel), open it, and drag InsightLens to Applications

              **Linux:** Download the AppImage, make executable with \`chmod +x\` and run

              ### Auto-update metadata

              The \`latest*.yml\` files attached to this release are consumed by the in-app auto-updater (electron-updater). Don't delete them."
          fi

  build:
    needs: prepare-release
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
        include:
          - os: macos-latest
            platform: mac
          - os: ubuntu-latest
            platform: linux
          - os: windows-latest
            platform: win

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v7

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript and React
        run: npm run build

      - name: Build Electron app (Windows)
        if: matrix.os == 'windows-latest'
        run: npm run dist -- --win --publish always
        env:
          ELECTRON_BUILDER_ALLOW_UNRESOLVED_DEPENDENCIES: true
          # GH_TOKEN lets electron-builder upload binaries + latest.yml to the
          # draft release prepared by the prepare-release job.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Electron app (macOS)
        if: matrix.os == 'macos-latest'
        run: npm run dist -- --mac --publish always
        env:
          ELECTRON_BUILDER_ALLOW_UNRESOLVED_DEPENDENCIES: true
          # electron-builder imports the Developer ID cert from these (base64 .p12 + its password) —
          # no manual keychain step needed.
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          # Apple credentials for notarization. Renamed from APPLE_* so electron-builder's own
          # (buggy) auto-notarize doesn't fire alongside our scripts/notarize.js afterSign hook.
          NOTARIZE_APPLE_ID: ${{ secrets.APPLE_ID }}
          NOTARIZE_APPLE_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          NOTARIZE_APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Electron app (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: npm run dist -- --linux --publish always
        env:
          ELECTRON_BUILDER_ALLOW_UNRESOLVED_DEPENDENCIES: true
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts (debugging copy in workflow storage)
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.platform }}-distributables
          path: |
            dist-electron/*.exe
            dist-electron/*.dmg
            dist-electron/*.zip
            dist-electron/*.AppImage
            dist-electron/*.yml
            dist-electron/*.yaml

  # Flip the draft release to live now that all platforms have uploaded.
  # Must pass --repo explicitly: gh release edit normally reads the repo
  # from the local git context, but this job runs on a fresh runner without
  # actions/checkout (nothing else to do here, so no checkout step). v1.7.3
  # failed at exactly this step ("fatal: not a git repository") before the
  # --repo flag was added.
  finalize-release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Publish draft release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release edit "${{ github.ref_name }}" \
            --repo ${{ github.repository }} \
            --draft=false

  # Manual credential check (Actions tab → Build and Release → Run workflow).
  # Builds, signs, and notarizes a single-arch macOS app with publishing
  # disabled, then verifies the staple and Gatekeeper assessment. Fails if
  # the certificate or Apple credentials are invalid (e.g. lapsed developer
  # membership) — without touching any release.
  notarize-check:
    if: github.event_name == 'workflow_dispatch'
    runs-on: macos-latest
    steps:
      - name: Check out Git repository
        uses: actions/checkout@v7

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript and React
        run: npm run build

      - name: Build, sign and notarize (arm64 zip, no publish)
        run: npm run dist -- --mac zip --arm64 --publish never
        env:
          ELECTRON_BUILDER_ALLOW_UNRESOLVED_DEPENDENCIES: true
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          NOTARIZE_APPLE_ID: ${{ secrets.APPLE_ID }}
          NOTARIZE_APPLE_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          NOTARIZE_APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Verify notarization
        run: |
          APP="dist-electron/mac-arm64/InsightLens.app"
          echo "── codesign ──"
          codesign --verify --deep --strict --verbose=2 "$APP"
          echo "── stapler (notarization ticket) ──"
          xcrun stapler validate "$APP"
          echo "── Gatekeeper assessment ──"
          spctl --assess --type execute --verbose=2 "$APP"
          echo "✅ Signed, notarized, and stapled — credentials are good."
